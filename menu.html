<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flavour Nest - Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="./assets/salad.png">
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="home.html">
      <img src="./assets/Your_paragraph_text-removebg-preview.png" alt="logo" height="170">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarScroll">
      <ul class="navbar-nav m-auto my-2 my-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="menu.html">Menu</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="about.html">About Us</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="location.html">Location</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center mb-4">Our Menu 🍽️</h2>

  <div class="row justify-content-center">

    <div class="col-md-3 mb-4">
      <div class="card p-3 text-center">
        <img src="assets/burger.jpg" class="img-fluid mb-2" alt="Burger">
        <h5>Burger</h5>
        <p>₹120</p>
        <button class="btn btn-primary" onclick="addToCart(1,'Burger',120)">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-3 mb-4">
      <div class="card p-3 text-center">
        <img src="assets/pizza.jpg" class="img-fluid mb-2" alt="Pizza">
        <h5>Pizza</h5>
        <p>₹250</p>
        <button class="btn btn-primary" onclick="addToCart(2,'Pizza',250)">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-3 mb-4">
      <div class="card p-3 text-center">
        <img src="assets/pasta.jpg" class="img-fluid mb-2" alt="Pasta">
        <h5>Pasta</h5>
        <p>₹180</p>
        <button class="btn btn-primary" onclick="addToCart(3,'Pasta',180)">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-3 mb-4">
      <div class="card p-3 text-center">
        <img src="assets/sandwich.jpg" class="img-fluid mb-2" alt="Sandwich">
        <h5>Sandwich</h5>
        <p>₹100</p>
        <button class="btn btn-primary" onclick="addToCart(4,'Sandwich',100)">Add to Cart</button>
      </div>
    </div>

  </div>
</div>

<div class="container mt-5">
  <h2 class="text-center mb-3">Your Cart 🛒</h2>
  <div id="cart-items" class="mb-3"></div>
  <h4 class="text-center" id="total-price">Total: ₹0</h4>
  <div class="text-center">
    <button class="btn btn-success" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>

let cart = [];
function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function addToCart(id, name, price) {
  const existing = cart.find(item => item.id === id);
  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({ id, name, price, quantity: 1 });
  }
  saveCart();
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  saveCart();
}

function renderCart() {
  const container = document.getElementById("cart-items");
  container.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    container.innerHTML = "<p class='text-center'>Cart is empty</p>";
  }

  cart.forEach(item => {
    total += item.price * item.quantity;

    const div = document.createElement("div");
    div.classList.add("d-flex","justify-content-between","align-items-center","mb-2","p-2","border");

    div.innerHTML = `
      <span>${item.name} (x${item.quantity}) - ₹${item.price*item.quantity}</span>
      <button class="btn btn-danger btn-sm">Remove</button>
    `;

    div.querySelector("button").onclick = () => {
      removeFromCart(item.id);
    };

    container.appendChild(div);
  });

  document.getElementById("total-price").textContent = `Total: ₹${total}`;
}

function placeOrder() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }
  alert("Order placed successfully!");
  cart = [];
  saveCart();
}

renderCart();
</script>

</body>
</html>
